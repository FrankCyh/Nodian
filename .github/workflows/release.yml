name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$MANIFEST_VERSION" = "$TAG_VERSION"
          test "$PACKAGE_VERSION" = "$TAG_VERSION"

      - name: Build release assets
        run: npm run build

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" main.js manifest.json styles.css --clobber
          else
            gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css \
              --title "$GITHUB_REF_NAME" \
              --notes "Release $GITHUB_REF_NAME" \
              --verify-tag
          fi
